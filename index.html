<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 みんなのスケジュール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:13px;color:#5a4a5a;background:#fdf6fb;min-height:100vh}
:root{
  --pink:#f9c4d2;--pink2:#f7a8bf;--pink-text:#c4607a;
  --lav:#d9cff5;--lav2:#c5b8ef;--lav-text:#7c63c4;
  --mint:#c7edd8;--mint-text:#3a8f62;
  --peach:#fde4c8;--peach-text:#c47830;
  --sky:#c8e8f8;--sky-text:#2878a8;
  --border:#f0e0ec;
}
#app{display:flex;flex-direction:column;gap:10px;padding:12px 16px;max-width:1100px;margin:0 auto}
.header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nav-btn{background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;color:#9a7a9a;font-size:12px;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:var(--pink);border-color:var(--pink2);color:var(--pink-text)}
.period-title{font-size:15px;font-weight:700;flex:1;text-align:center;color:#7a5a7a}
.view-tabs{display:flex;gap:4px;background:#f5eaf5;border-radius:20px;padding:3px}
.tab{padding:4px 12px;border-radius:16px;border:none;background:none;cursor:pointer;font-size:12px;color:#b090b0;font-family:inherit}
.tab.active{background:#fff;color:var(--pink-text);font-weight:700;box-shadow:0 1px 4px rgba(200,100,150,.15)}
.add-btn{background:linear-gradient(135deg,var(--pink2),var(--lav2));border:none;border-radius:20px;padding:5px 14px;cursor:pointer;color:#fff;font-size:12px;font-weight:700;font-family:inherit}
.user-chip{display:flex;align-items:center;gap:5px;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;color:#7a5a7a;cursor:pointer}
.user-chip:hover{border-color:var(--pink2)}
.status{font-size:11px;color:#c0a0c0;text-align:center;min-height:16px}

/* Group Week */
.gw-outer{border-radius:20px;border:1.5px solid var(--border);overflow:hidden;background:#fff}
.gw-wrap{overflow-y:auto;max-height:calc(100vh - 120px)}
.gw-header{display:grid;grid-template-columns:90px repeat(7,1fr);position:sticky;top:0;z-index:10;background:#fdf0f8;border-bottom:1.5px solid var(--border)}
.gw-day-head{padding:6px 4px;text-align:center;border-right:1px solid #f5e5f5;display:flex;flex-direction:column;align-items:center;gap:1px}
.gw-day-head.gw-today-h{background:#fff5fa}
.gw-dow{font-size:10px;color:#c0a0c0;font-weight:500}
.gw-dnum{font-size:17px;font-weight:700;color:#7a5a7a;line-height:1.2}
.gw-dnum-today{background:var(--pink2);color:#fff;border-radius:50%;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-size:14px}
.gw-header-label{border-right:1.5px solid var(--border)}
.gw-todo-area{margin-bottom:4px;padding-bottom:4px;border-bottom:1px dashed #f0d8e8}
.todo-chip{font-size:9px;padding:1px 5px;border-radius:6px;background:#fff0f5;color:#c4607a;margin-bottom:2px;display:flex;align-items:center;gap:3px;word-break:break-all}
.todo-chip.done{opacity:.45;text-decoration:line-through}
.todo-add-icon{font-size:9px;color:#e0c0d0}
.todo-item{display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #f8eef8}
.todo-item:last-child{border-bottom:none}
.todo-check{cursor:pointer;font-size:15px;flex-shrink:0}
.todo-text{flex:1;font-size:12px;color:#7a5a7a;word-break:break-all}
.todo-text.todo-done{opacity:.45;text-decoration:line-through}
.todo-del{cursor:pointer;font-size:12px;opacity:.5;flex-shrink:0}
.todo-del:hover{opacity:1}
.gw-user-row{display:grid;grid-template-columns:90px repeat(7,1fr);border-bottom:1.5px solid var(--border)}
.gw-user-row:last-child{border-bottom:none}
.gw-name-cell{display:flex;align-items:flex-start;padding:8px 6px;border-right:1.5px solid var(--border);background:#fdf8fd}
.gw-name-tag{padding:6px 8px;border-radius:10px;width:100%;display:flex;align-items:center;font-size:12px;font-weight:700}
.gw-cell{padding:5px;border-right:1px solid #f5e5f5;cursor:pointer;transition:background .1s;word-break:break-all;min-height:48px}
.gw-cell:hover{background:#fdf5fc}
.gw-cell.gw-today-col{background:#fff8fc}
.gw-cell:last-child{border-right:none}

/* Events */
.ev-allday{display:block;font-size:10px;padding:1px 6px;border-radius:8px;margin-bottom:2px;cursor:pointer;font-weight:700;word-break:break-all;white-space:normal}
.badge-out{background:var(--peach);color:var(--peach-text)}
.badge-off{background:var(--pink);color:var(--pink-text)}
.badge-meet{background:var(--lav);color:var(--lav-text)}
.badge-default{background:var(--sky);color:var(--sky-text)}
.ev-timed{display:flex;align-items:flex-start;gap:3px;margin-bottom:3px;cursor:pointer;line-height:1.4}
.ev-timed:hover .ev-title{text-decoration:underline}
.ev-time{font-size:9px;color:#c0a0c0;white-space:nowrap;flex-shrink:0;padding-top:1px}
.ev-title{font-size:10px;color:#7a5a7a;white-space:normal;word-break:break-all}
.ev-badge{display:inline-block;font-size:9px;padding:0 4px;border-radius:6px;margin-right:1px;flex-shrink:0;font-weight:700}
.bm{background:var(--lav);color:var(--lav-text)}
.bc{background:var(--peach);color:var(--peach-text)}
.bf{background:var(--mint);color:var(--mint-text)}

/* Month */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;background:#f5e5f5;border-radius:20px;overflow:hidden;padding:2px}
.month-dh{background:#fdf0f8;padding:4px;text-align:center;font-size:11px;color:#b090b0;font-weight:700;border-radius:10px}
.month-cell{background:#fff;min-height:80px;padding:4px;cursor:pointer;border-radius:12px;transition:background .1s}
.month-cell:hover{background:#fdf5fc}
.month-cell.other{background:#fdf8fd;opacity:.7}
.month-cell.today .mdate{background:var(--pink2);color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.mdate{font-size:11px;font-weight:700;width:20px;height:20px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;color:#9a7a9a}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(180,100,160,.25);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:24px;border:1.5px solid var(--border);padding:22px;width:340px;max-width:95vw;box-shadow:0 8px 32px rgba(200,100,180,.12);max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#7a5a7a}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:11px;color:#b090b0;margin-bottom:3px;font-weight:700}
.frow input,.frow textarea,.frow select{width:100%;border:1.5px solid #f0daf0;border-radius:14px;padding:6px 10px;font-size:12px;background:#fdf8fd;color:#7a5a7a;font-family:inherit;outline:none;transition:border-color .15s}
.frow input:focus,.frow textarea:focus{border-color:var(--pink2)}
.frow textarea{resize:vertical;min-height:48px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.cdot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .1s}
.cdot:hover{transform:scale(1.15)}
.cdot.sel{border-color:#7a5a7a;transform:scale(1.1)}
.btn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
.btn{padding:5px 12px;border-radius:14px;border:1.5px solid #f0daf0;font-size:12px;cursor:pointer;background:#fff;color:#a080a0;font-family:inherit;font-weight:700;transition:all .15s}
.btn:hover{background:#fdf0f8;border-color:var(--pink2)}
.btn.pri{background:linear-gradient(135deg,var(--pink2),var(--lav2));color:#fff;border:none}
.btn.del{color:var(--pink-text);border-color:var(--pink)}
.btn.del:hover{background:var(--pink);color:#fff}
.err{color:var(--pink-text);font-size:11px;min-height:14px;margin-top:4px}
.att-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.att-label{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid #f0daf0;font-size:12px;font-weight:700;color:#a080a0;cursor:pointer;transition:all .15s;background:#fdf8fd;user-select:none}
.att-label:hover{border-color:var(--pink2);background:var(--pink)}
.att-label.att-checked{border-color:var(--pink2);background:var(--pink);color:var(--pink-text)}
.att-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.allday-toggle{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1.5px solid #f0daf0;font-size:12px;font-weight:700;color:#a080a0;cursor:pointer;transition:all .15s;background:#fdf8fd;user-select:none;margin-bottom:8px}
.allday-toggle.on{border-color:var(--lav2);background:var(--lav);color:var(--lav-text)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <button class="nav-btn" onclick="prev()">◀</button>
    <span class="period-title" id="ptitle"></span>
    <button class="nav-btn" onclick="next()">▶</button>
    <button class="nav-btn" onclick="goToday()">🌸 今日</button>
    <div class="view-tabs">
      <button class="tab" id="tab-month" onclick="setView('month')">📅 月</button>
      <button class="tab active" id="tab-week" onclick="setView('week')">🗓 週</button>
    </div>
    <button class="add-btn" onclick="openModal(null)">＋ 予定を追加</button>
    <div class="user-chip" onclick="openNamePicker()">👤 <span id="user-chip-name">名前を選ぶ</span> ▼</div>
  </div>
  <div id="status" class="status">読み込み中…🌷</div>
  <div id="calendar"></div>
</div>
<div id="mc"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB = supabase.createClient(
  'https://pklnnihgqjbkytdfgvwr.supabase.co',
  'sb_publishable_IqjrimJcx3OFwJ_teGddxg_Y2JBGBfB'
);

const PRESET_USERS = [
  {name:'林',emoji:'🍀'},
  {name:'秋定',emoji:'🌺'},
  {name:'三尾',emoji:'⭐'},
  {name:'岩下',emoji:'🌙'},
  {name:'佐藤',emoji:'🌿'}
];
const COLOR_POOL = ['#f7a8bf','#c5b8ef','#a8dfc0','#fcd0a0','#a8d8f0','#f0b8d8','#b8e0d0','#d0b8f0'];
const COLORS = ['#f9c4d2','#d9cff5','#c7edd8','#fde4c8','#c8e8f8','#f7d4b8','#e8c8f0','#c8e8d8'];
const DOW = ['日','月','火','水','木','金','土'];
const DOW_EMO = ['☀️','','','','','','🌙'];
const USER_COLORS = {};

let view = 'week';
let current = new Date();
let events = [];
let todos = [];
let allUsers = [];
let currentUser = null;
let editId = null;
let selColor = COLORS[0];

function getUserColor(name) {
  if (!USER_COLORS[name]) {
    const idx = Object.keys(USER_COLORS).length % COLOR_POOL.length;
    USER_COLORS[name] = COLOR_POOL[idx];
  }
  return USER_COLORS[name];
}
// プリセットの色を先に確定
PRESET_USERS.forEach(u => getUserColor(u.name));

function p2(n) { return String(n).padStart(2,'0'); }
function toISO(d) { return d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate()); }
function fmtLocal(dt) {
  const d = new Date(dt);
  return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate())+'T'+p2(d.getHours())+':'+p2(d.getMinutes());
}
function fmtTime(dt) {
  const d = new Date(dt);
  return d.getHours()+':'+p2(d.getMinutes());
}
function isAllday(e) {
  if (!e || !e.start_at) return false;
  if (e.all_day) return true;
  return fmtTime(e.start_at) === '0:00' && fmtTime(e.end_at) === '0:00';
}
function darken(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return 'rgb('+Math.max(0,r-80)+','+Math.max(0,g-80)+','+Math.max(0,b-80)+')';
}

// ===== DATA =====
async function load() {
  document.getElementById('status').textContent = '読み込み中…🌷';
  try {
    const {data, error} = await SB.from('schedule_events').select('*').order('start_at');
    if (error) throw error;
    events = data || [];
    const {data:todoData, error:todoError} = await SB.from('schedule_todos').select('*').order('created_at');
    if (todoError) throw todoError;
    todos = todoData || [];
    const userSet = new Set(PRESET_USERS.map(u => u.name));
    events.forEach(e => {
      if (e.attendees && e.attendees.length > 0) e.attendees.forEach(a => userSet.add(a));
      else if (e.user_name) userSet.add(e.user_name);
    });
    if (currentUser) userSet.add(currentUser);
    const presetNames = PRESET_USERS.map(u => u.name);
    const extra = Array.from(userSet).filter(u => !presetNames.includes(u));
    allUsers = [...presetNames, ...extra];
    document.getElementById('status').textContent = '';
    render();
  } catch(err) {
    document.getElementById('status').textContent = 'エラー: ' + err.message;
  }
}

function todosOn(isoDate, user) {
  return todos.filter(t => {
    if (t.todo_date !== isoDate) return false;
    if (!user) return true;
    return t.user_name === user;
  });
}

function eventsOn(ds, user) {
  return events.filter(e => {
    if (toISO(new Date(e.start_at)) !== ds) return false;
    if (!user) return true;
    const att = e.attendees && e.attendees.length > 0 ? e.attendees : [e.user_name];
    return att.includes(user);
  });
}

function badge(e) {
  const t = e.title || '';
  if (t.includes('会議') || t.includes('MT') || t.includes('報告会')) return '<span class="ev-badge bm">🗣</span>';
  if (t.includes('電話') || t.includes('TEL')) return '<span class="ev-badge bc">📞</span>';
  if (t.includes('面談')) return '<span class="ev-badge bf">💬</span>';
  if (t.includes('出張')) return '<span class="ev-badge" style="background:#fde4c8;color:#c47830">✈️</span>';
  return '';
}

// ===== RENDER =====
function setView(v) {
  view = v;
  document.getElementById('tab-month').className = 'tab' + (v==='month' ? ' active' : '');
  document.getElementById('tab-week').className = 'tab' + (v==='week' ? ' active' : '');
  render();
}
function prev() {
  if (view==='month') current = new Date(current.getFullYear(), current.getMonth()-1, 1);
  else current = new Date(current.getTime() - 7*86400000);
  render();
}
function next() {
  if (view==='month') current = new Date(current.getFullYear(), current.getMonth()+1, 1);
  else current = new Date(current.getTime() + 7*86400000);
  render();
}
function goToday() { current = new Date(); render(); }
function render() { if (view==='week') renderWeek(); else renderMonth(); }

function renderWeek() {
  const d = new Date(current);
  d.setDate(d.getDate() - d.getDay());
  const days = Array.from({length:7}, (_,i) => { const x=new Date(d); x.setDate(x.getDate()+i); return x; });
  const today = toISO(new Date());
  document.getElementById('ptitle').textContent =
    '✨ '+(days[0].getMonth()+1)+'月'+days[0].getDate()+'日 〜 '+(days[6].getMonth()+1)+'月'+days[6].getDate()+'日';

  let h = '<div class="gw-outer"><div class="gw-wrap">';
  // ヘッダー
  h += '<div class="gw-header"><div class="gw-header-label"></div>';
  days.forEach((day,i) => {
    const isT = toISO(day) === today;
    const col = i===0 ? 'color:#e08090' : i===6 ? 'color:#8090e0' : '';
    h += '<div class="gw-day-head'+(isT?' gw-today-h':'')+'" style="'+col+'">';
    h += '<span class="gw-dow">'+DOW_EMO[i]+' '+DOW[i]+'</span>';
    h += '<span class="gw-dnum'+(isT?' gw-dnum-today':'')+'">'+day.getDate()+'</span>';
    h += '</div>';
  });
  h += '</div>';

  // 人ごとの行
  allUsers.forEach(u => {
    const uc = getUserColor(u);
    const isMe = u === currentUser;
    h += '<div class="gw-user-row">';
    h += '<div class="gw-name-cell"><div class="gw-name-tag" style="background:'+uc+'30;border-left:3px solid '+uc+';color:'+darken(uc)+'">'+(isMe?'🌸 ':'')+u+'</div></div>';
    days.forEach((day,i) => {
      const ds = toISO(day);
      const isT = ds === today;
      const iso = day.getFullYear()+'-'+p2(day.getMonth()+1)+'-'+p2(day.getDate());
      const evs = eventsOn(ds, u);
      const uTodos = todosOn(iso, u);
      h += '<div class="gw-cell'+(isT?' gw-today-col':'')+'" onclick="openModal(\''+iso+'\',null,9,\''+u+'\')">';
      h += '<div class="gw-todo-area" onclick="event.stopPropagation();openTodoPanel(\''+iso+'\',\''+u+'\')">';
      uTodos.forEach(t => {
        h += '<div class="todo-chip'+(t.done?' done':'')+'">'+(t.done?'✅':'⬜')+' '+t.content+'</div>';
      });
      h += '<div class="todo-add-icon">＋ TODO</div>';
      h += '</div>';
      evs.filter(e=>isAllday(e)).forEach(e => {
        const t = e.title||'';
        const cls = t.includes('出張')?'badge-out':t.includes('休')?'badge-off':t.includes('会議')||t.includes('MT')?'badge-meet':'badge-default';
        h += '<span class="ev-allday '+cls+'" onclick="event.stopPropagation();openModal(null,\''+e.id+'\')" title="'+t+'">'+t+'</span>';
      });
      evs.filter(e=>!isAllday(e)).forEach(e => {
        h += '<div class="ev-timed" onclick="event.stopPropagation();openModal(null,\''+e.id+'\')">';
        h += '<span class="ev-time">'+fmtTime(e.start_at)+'-'+fmtTime(e.end_at)+'</span>';
        h += badge(e)+'<span class="ev-title">'+e.title+'</span></div>';
      });
      h += '</div>';
    });
    h += '</div>';
  });

  h += '</div></div>';
  document.getElementById('calendar').innerHTML = h;
}

function renderMonth() {
  const y = current.getFullYear(), m = current.getMonth();
  document.getElementById('ptitle').textContent = '✨ '+y+'年'+(m+1)+'月';
  const startDow = new Date(y,m,1).getDay();
  const dim = new Date(y,m+1,0).getDate();
  const today = toISO(new Date());
  let h = '<div class="month-grid">';
  DOW.forEach((d,i) => {
    const col = i===0?'color:#e08090':i===6?'color:#8090e0':'';
    h += '<div class="month-dh" style="'+col+'">'+DOW_EMO[i]+' '+d+'</div>';
  });
  const prevDays = new Date(y,m,0).getDate();
  for (let i=startDow-1;i>=0;i--)
    h += '<div class="month-cell other"><div class="mdate" style="color:#d8c8d8">'+(prevDays-i)+'</div></div>';
  for (let d=1;d<=dim;d++) {
    const ds = y+'/'+p2(m+1)+'/'+p2(d);
    const iso = y+'-'+p2(m+1)+'-'+p2(d);
    const isT = ds===today;
    const evs = eventsOn(ds);
    h += '<div class="month-cell'+(isT?' today':'')+'" onclick="openModal(\''+iso+'\')">';
    h += '<div class="mdate">'+d+'</div>';
    evs.slice(0,4).forEach(e => {
      if (isAllday(e)) {
        const t = e.title||'';
        const cls = t.includes('出張')?'badge-out':t.includes('休')?'badge-off':t.includes('会議')||t.includes('MT')?'badge-meet':'badge-default';
        h += '<span class="ev-allday '+cls+'" onclick="event.stopPropagation();openModal(null,\''+e.id+'\')" title="'+t+'">'+t+'</span>';
      } else {
        h += '<div class="ev-timed" onclick="event.stopPropagation();openModal(null,\''+e.id+'\')">';
        h += '<span class="ev-time">'+fmtTime(e.start_at)+'</span>'+badge(e)+'<span class="ev-title">'+e.title+'</span></div>';
      }
    });
    if (evs.length>4) h += '<div style="font-size:10px;color:#c0a0c0">+'+(evs.length-4)+'件 🌸</div>';
    h += '</div>';
  }
  const rem = (7-((startDow+dim)%7))%7;
  for (let d=1;d<=rem;d++)
    h += '<div class="month-cell other"><div class="mdate" style="color:#d8c8d8">'+d+'</div></div>';
  h += '</div>';
  document.getElementById('calendar').innerHTML = h;
}

// ===== NAME PICKER =====
function setUser(name) {
  currentUser = name;
  localStorage.setItem('schedule_user', name);
  document.getElementById('user-chip-name').textContent = name;
}

function openNamePicker() {
  const btns = PRESET_USERS.map(u =>
    '<button class="att-label" onclick="pickName(\''+u.name+'\')" style="font-size:13px;padding:8px 14px">'+
    '<span class="att-dot" style="background:'+getUserColor(u.name)+'"></span>'+u.emoji+' '+u.name+'</button>'
  ).join('');
  document.getElementById('mc').innerHTML =
    '<div class="modal-bg" onclick="closeModal()">'+
    '<div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-title">🌸 自分の名前を選んでね</div>'+
    '<div class="att-grid" style="margin-bottom:14px">'+btns+'</div>'+
    '<div style="display:flex;gap:8px">'+
    '<input id="custom-name-pick" style="flex:1;border:1.5px solid #f0daf0;border-radius:14px;padding:7px 10px;font-size:12px;background:#fdf8fd;color:#7a5a7a;font-family:inherit;outline:none" placeholder="または直接入力..." maxlength="20">'+
    '<button class="btn pri" onclick="pickNameCustom()">決定</button>'+
    '</div></div></div>';
}
function pickName(name) { setUser(name); closeModal(); if(allUsers.indexOf(name)<0){allUsers.push(name);} render(); }
function pickNameCustom() {
  const n = document.getElementById('custom-name-pick').value.trim();
  if (!n) return;
  pickName(n);
}

// ===== TODO PANEL =====
let todoPanelDate = null;
let todoPanelUser = null;
function openTodoPanel(isoDate, user) {
  todoPanelDate = isoDate;
  todoPanelUser = user || currentUser;
  renderTodoPanel();
}
function renderTodoPanel() {
  const dTodos = todos.filter(t => t.todo_date === todoPanelDate && t.user_name === todoPanelUser);
  const dateLabel = new Date(todoPanelDate+'T00:00:00');
  const label = (dateLabel.getMonth()+1)+'月'+dateLabel.getDate()+'日';
  const items = dTodos.map(t =>
    '<div class="todo-item">'+
    '<span class="todo-check" onclick="toggleTodo(\''+t.id+'\')">'+(t.done?'✅':'⬜')+'</span>'+
    '<span class="todo-text'+(t.done?' todo-done':'')+'">'+t.content.replace(/</g,'&lt;')+'</span>'+
    '<span class="todo-del" onclick="deleteTodo(\''+t.id+'\')">🗑</span>'+
    '</div>'
  ).join('') || '<div style="font-size:12px;color:#c0a0c0;text-align:center;padding:10px 0">まだTODOがありません🌷</div>';

  document.getElementById('mc').innerHTML =
    '<div class="modal-bg" onclick="closeModal()">'+
    '<div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-title">📝 '+todoPanelUser+'さんの '+label+' TODO</div>'+
    '<div id="todo-list" style="margin-bottom:12px;max-height:240px;overflow-y:auto">'+items+'</div>'+
    '<div style="display:flex;gap:8px">'+
    '<input id="new-todo-input" placeholder="新しいTODOを入力..." style="flex:1;border:1.5px solid #f0daf0;border-radius:14px;padding:7px 10px;font-size:12px;background:#fdf8fd;color:#7a5a7a;font-family:inherit;outline:none">'+
    '<button class="btn pri" onclick="addTodo()">追加</button>'+
    '</div>'+
    '<div class="btn-row"><button class="btn" onclick="closeModal()">閉じる</button></div>'+
    '</div></div>';
  const inp = document.getElementById('new-todo-input');
  inp.addEventListener('keydown', e => { if (e.key==='Enter') addTodo(); });
}

async function addTodo() {
  const inp = document.getElementById('new-todo-input');
  const content = inp.value.trim();
  if (!content) return;
  const {error} = await SB.from('schedule_todos').insert({
    todo_date: todoPanelDate, content, done:false, user_name: todoPanelUser
  });
  if (error) { alert('TODO追加エラー: '+error.message); return; }
  await load();
  renderTodoPanel();
}

async function toggleTodo(id) {
  const t = todos.find(x => x.id===id);
  if (!t) return;
  const {error} = await SB.from('schedule_todos').update({done: !t.done}).eq('id', id);
  if (error) { alert('更新エラー: '+error.message); return; }
  await load();
  renderTodoPanel();
}

async function deleteTodo(id) {
  if (!confirm('このTODOを削除しますか？🌷')) return;
  const {error} = await SB.from('schedule_todos').delete().eq('id', id);
  if (error) { alert('削除エラー: '+error.message); return; }
  await load();
  renderTodoPanel();
}

// ===== MODAL =====
function openModal(dateStr, id, hour, targetUser) {
  editId = id || null;
  const ev = id ? events.find(e => e.id===id) : null;
  selColor = ev ? ev.color : COLORS[0];
  const defDate = dateStr || (ev ? new Date(ev.start_at).toISOString().slice(0,10) : new Date().toISOString().slice(0,10));
  const defHour = hour !== undefined && hour !== null ? hour : 9;
  const defS = defDate+'T'+p2(defHour)+':00';
  const defE = defDate+'T'+p2(Math.min(defHour+1,23))+':00';
  const isEv = !!ev;
  const evAllday = isEv && isAllday(ev);

  const selectableUsers = [...new Set([...PRESET_USERS.map(u=>u.name), ...allUsers, currentUser].filter(Boolean))];
  const defAttendees = isEv && ev.attendees && ev.attendees.length>0 ? ev.attendees
    : [targetUser||currentUser].filter(Boolean);

  const dots = COLORS.map(c =>
    '<div class="cdot'+(c===selColor?' sel':'')+'" style="background:'+c+'" onclick="pickColor(\''+c+'\')"></div>'
  ).join('');

  const checkboxes = selectableUsers.map(u => {
    const checked = defAttendees.includes(u);
    const uc = getUserColor(u);
    return '<label class="att-label'+(checked?' att-checked':'')+'" id="att-label-'+u+'" onclick="toggleAtt(\''+u+'\')">'+
      '<input type="checkbox" id="att-'+u+'"'+(checked?' checked':'')+' style="display:none">'+
      '<span class="att-dot" style="background:'+uc+'"></span>'+
      '<span>'+u+(u===currentUser?' 🌸':'')+'</span></label>';
  }).join('');

  document.getElementById('mc').innerHTML =
    '<div class="modal-bg" onclick="closeModal()">'+
    '<div class="modal" onclick="event.stopPropagation()">'+
    '<div class="modal-title">'+(isEv?'🌸 予定を編集':'🌸 予定を追加')+'</div>'+

    '<div class="frow"><label>👥 参加者（複数OK）</label>'+
    '<div class="att-grid">'+checkboxes+'</div></div>'+

    '<div class="frow"><label>📝 タイトル</label>'+
    '<input id="f-ti" placeholder="タイトルを入力" value="'+(isEv?ev.title.replace(/"/g,'&quot;'):'')+'"></div>'+

    '<div class="frow">'+
    '<div class="allday-toggle'+(evAllday?' on':'')+'" id="allday-toggle" onclick="toggleAllday()">'+
    '📅 終日にする</div>'+
    '<div id="time-fields" class="two" style="'+(evAllday?'display:none':'')+'">'+
    '<div><label>🕐 開始</label><input type="datetime-local" id="f-st" value="'+(isEv&&!evAllday?fmtLocal(ev.start_at):defS)+'"></div>'+
    '<div><label>🕑 終了</label><input type="datetime-local" id="f-en" value="'+(isEv&&!evAllday?fmtLocal(ev.end_at):defE)+'"></div>'+
    '</div>'+
    '<div id="date-fields" style="'+(evAllday?'':'display:none')+'">'+
    '<label style="font-size:11px;color:#b090b0;font-weight:700">📅 日付</label>'+
    '<input type="date" id="f-date" value="'+(isEv?new Date(ev.start_at).toISOString().slice(0,10):defDate)+'">'+
    '</div></div>'+

    '<div class="frow"><label>📍 場所</label>'+
    '<input id="f-lo" placeholder="場所（任意）" value="'+(isEv&&ev.location?ev.location.replace(/"/g,'&quot;'):'')+'"></div>'+

    '<div class="frow"><label>💭 メモ</label>'+
    '<textarea id="f-de">'+(isEv&&ev.description?ev.description:'')+'</textarea></div>'+

    '<div class="frow"><label>🎨 カラー</label>'+
    '<div class="color-row" id="cdots">'+dots+'</div></div>'+

    '<div class="err" id="merr"></div>'+
    '<div class="btn-row">'+
    (isEv?'<button class="btn del" onclick="delEv()">🗑 削除</button>':'')+
    '<button class="btn" onclick="closeModal()">キャンセル</button>'+
    '<button class="btn pri" onclick="saveEv()">保存 ✨</button>'+
    '</div></div></div>';
}

function toggleAllday() {
  const tog = document.getElementById('allday-toggle');
  const tf = document.getElementById('time-fields');
  const df = document.getElementById('date-fields');
  const on = tog.classList.contains('on');
  if (on) { tog.classList.remove('on'); tf.style.display=''; df.style.display='none'; }
  else { tog.classList.add('on'); tf.style.display='none'; df.style.display=''; }
}

function toggleAtt(u) {
  const cb = document.getElementById('att-'+u);
  const lb = document.getElementById('att-label-'+u);
  if (!cb) return;
  cb.checked = !cb.checked;
  lb.className = 'att-label' + (cb.checked?' att-checked':'');
}

function pickColor(c) {
  selColor = c;
  document.querySelectorAll('.cdot').forEach(el => {
    const rgb = el.style.backgroundColor;
    const m = rgb.match(/\d+/g);
    if (!m) return;
    const hex = '#'+m.slice(0,3).map(n=>parseInt(n).toString(16).padStart(2,'0')).join('');
    el.className = 'cdot' + (hex.toLowerCase()===c.toLowerCase()?' sel':'');
  });
}

function closeModal() { document.getElementById('mc').innerHTML = ''; }

async function saveEv() {
  const title = document.getElementById('f-ti').value.trim();
  if (!title) { document.getElementById('merr').textContent='🌷 タイトルを入力してください'; return; }

  const alldayOn = document.getElementById('allday-toggle').classList.contains('on');
  let startISO, endISO;
  if (alldayOn) {
    const date = document.getElementById('f-date').value;
    if (!date) { document.getElementById('merr').textContent='🌷 日付を入力してください'; return; }
    startISO = new Date(date+'T00:00:00').toISOString();
    endISO   = new Date(date+'T00:00:00').toISOString();
  } else {
    const start = document.getElementById('f-st').value;
    const end   = document.getElementById('f-en').value;
    if (!start||!end) { document.getElementById('merr').textContent='🌷 日時を入力してください'; return; }
    if (new Date(end)<=new Date(start)) { document.getElementById('merr').textContent='🌷 終了は開始より後にしてください'; return; }
    startISO = new Date(start).toISOString();
    endISO   = new Date(end).toISOString();
  }

  const selectableUsers = [...new Set([...PRESET_USERS.map(u=>u.name),...allUsers,currentUser].filter(Boolean))];
  const attendees = selectableUsers.filter(u => { const cb=document.getElementById('att-'+u); return cb&&cb.checked; });
  if (attendees.length===0) { document.getElementById('merr').textContent='🌷 参加者を1人以上選んでください'; return; }

  document.getElementById('merr').textContent = '';
  const payload = {
    title, start_at:startISO, end_at:endISO, all_day:alldayOn,
    description: document.getElementById('f-de').value,
    location:    document.getElementById('f-lo').value,
    color: selColor, user_name: attendees[0], attendees,
    updated_at: new Date().toISOString()
  };
  let error;
  if (editId) { ({error}=await SB.from('schedule_events').update(payload).eq('id',editId)); }
  else        { ({error}=await SB.from('schedule_events').insert(payload)); }
  if (error) { document.getElementById('merr').textContent='保存エラー: '+error.message; return; }
  closeModal();
  await load();
}

async function delEv() {
  if (!editId || !confirm('この予定を削除しますか？🌷')) return;
  const {error} = await SB.from('schedule_events').delete().eq('id',editId);
  if (error) { alert('削除エラー: '+error.message); return; }
  closeModal();
  await load();
}

// ===== INIT =====
const saved = localStorage.getItem('schedule_user');
if (saved) setUser(saved);
load();
</script>
</body>
